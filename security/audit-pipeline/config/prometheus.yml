global:
  scrape_interval:     15s
  evaluation_interval: 15s

# ── Alert rules ────────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.yml

# ── Scrape targets ─────────────────────────────────────────────────────────────
scrape_configs:
  # The Python agent's Prometheus metrics endpoint
  - job_name: ai-agent-simulator
    static_configs:
      - targets: ["simulator:8000"]
    scrape_interval: 5s

  # Prometheus scrapes itself (for meta-monitoring)
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
